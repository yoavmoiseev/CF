<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Content Filter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      width: 380px;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      pointer-events: auto;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #333;
    }
    
    /* Status Section */
    .status-box {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      border-left: 4px solid #667eea;
    }
    #status {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #333;
    }
    #grade {
      font-size: 14px;
      color: #666;
      margin-bottom: 2px;
    }
    #gradeDescription {
      font-size: 13px;
      color: #999;
    }
    
    /* Findings Section */
    .findings {
      font-size: 12px;
      background: #f3f4f6;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      max-height: 150px;
      overflow-y: auto;
    }
    .findings div {
      margin: 4px 0;
      color: #555;
    }
    .findings strong {
      color: #333;
    }
    
    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      pointer-events: auto;
      z-index: 1000;
      position: relative;
    }
    button {
      flex: 1;
      min-width: 90px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      z-index: 1000;
      pointer-events: auto;
    }
    button::after {
      display: none !important;
    }
    button::before {
      display: none !important;
    }
    #toggle {
      background-color: #667eea;
      color: white;
      flex: 0 1 100%;
    }
    #toggle:hover {
      background-color: #5568d3;
      transform: translateY(-1px);
    }
    #analyze {
      background-color: #10b981;
      color: white;
    }
    #analyze:hover {
      background-color: #059669;
    }
    #feedback {
      background-color: #f59e0b;
      color: white;
    }
    #feedback:hover {
      background-color: #d97706;
    }
    
    /* Grade Override */
    .grade-override {
      background: #fef3c7;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #fbbf24;
      pointer-events: auto;
      z-index: 1000;
    }
    .grade-override label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .grade-slides {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #gradeSlider {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #ef4444, #f97316, #eab308, #84cc16, #22c55e);
    }
    #gradeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid #667eea;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    #gradeSlider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid #667eea;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    #gradeValue {
      font-weight: bold;
      color: #667eea;
      min-width: 30px;
      text-align: center;
    }
    
    /* Whitelist/Blacklist */
    .list-controls {
      display: flex;
      gap: 8px;
      pointer-events: auto;
      z-index: 1001;
    }
    #whitelist, #blacklist {
      flex: 1;
      padding: 6px 10px;
      font-size: 12px;
      background-color: #dcfce7;
      color: #15803d;
      border: 1px solid #86efac;
      pointer-events: auto;
      z-index: 1001;
    }
    #whitelist:hover, #blacklist:hover {
      background-color: #bbf7d0;
    }
    #blacklist {
      background-color: #fee2e2;
      color: #991b1b;
      border-color: #fca5a5;
    }
    #blacklist:hover {
      background-color: #fecaca;
    }
    
    /* Modal */
    #feedbackModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    #feedbackModal.show {
      display: flex;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .modal-content h3 {
      margin-bottom: 12px;
      color: #333;
    }
    .modal-content textarea {
      width: 100%;
      height: 100px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: sans-serif;
      font-size: 12px;
      resize: none;
      margin-bottom: 12px;
    }
    .modal-controls {
      display: flex;
      gap: 8px;
    }
    .modal-controls button {
      flex: 1;
    }
    #submitFeedback {
      background-color: #10b981;
      color: white;
    }
    #submitFeedback:hover {
      background-color: #059669;
    }
    #cancelFeedback {
      background-color: #e5e7eb;
      color: #333;
    }
    #cancelFeedback:hover {
      background-color: #d1d5db;
    }

    /* Language Switcher */
    .lang-switcher {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: flex-end;
    }
    .lang-btn {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      background: #f3f4f6;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    /* Logo video square */
    #logoWrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    #logoContainer {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid #667eea;
      position: relative;
      box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
      transition: width 0.35s ease, height 0.35s ease, border-radius 0.35s ease;
      flex-shrink: 0;
    }
    #logoContainer.expanded {
      width: 240px;
      height: 240px;
      border-radius: 14px;
    }
    #logoVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #logoLinkBar {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.65);
      text-align: center;
      padding: 5px 4px;
    }
    #logoContainer.expanded #logoLinkBar {
      display: block;
    }
    #logoYamLink {
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.3px;
    }
    #logoYamLink:hover {
      color: white;
      text-decoration: underline;
    }

    /* Unblur seconds control */
    .unblur-control {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .unblur-control label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 7px;
      color: #1e40af;
    }
    .unblur-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #unblurSlider {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #3b82f6, #06b6d4);
    }
    #unblurSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      border: 3px solid #3b82f6;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #unblurValue {
      font-weight: bold;
      color: #2563eb;
      min-width: 24px;
      text-align: center;
    }

    /* Blocker checkboxes */
    .blockers {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 8px 12px;
    }
    .blocker-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #15803d;
      cursor: pointer;
      user-select: none;
      flex: 1;
    }
    .blocker-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #10b981;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo video square — double-click to expand / collapse -->
    <div id="logoWrapper">
      <div id="logoContainer" title="Double-click to expand">
        <video id="logoVideo" muted playsinline autoplay></video>
        <div id="logoLinkBar">
          <a id="logoYamLink" href="https://yamsoft.org">yamsoft.org</a>
        </div>
      </div>
    </div>

    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="he">עב</button>
      <button class="lang-btn" data-lang="ru">РУС</button>
      <button class="lang-btn" data-lang="en">ENG</button>
    </div>

    <h2 data-i18n="title">Content Filter</h2>
    
    <div class="status-box">
      <div id="status">Status: ...</div>
      <div id="grade">Grade: --</div>
      <div id="gradeDescription">--</div>
    </div>

    <div class="findings" id="findings"></div>

    <div class="controls">
      <button id="toggle" data-i18n="toggle">Toggle Filter</button>
      <button id="analyze" data-i18n="analyze">Analyze Page</button>
      <button id="feedback" data-i18n="feedback">Give Feedback</button>
    </div>

    <div class="grade-override">
      <label data-i18n="gradeOverride">Override Grade (1-10):</label>
      <div class="grade-slides">
        <input type="range" id="gradeSlider" min="1" max="10" value="6" />
        <span id="gradeValue">6</span>
      </div>
    </div>

    <div class="unblur-control">
      <label data-i18n="unblurLabel">שניות לביטול טשטוש בריחוף:</label>
      <div class="unblur-row">
        <input type="range" id="unblurSlider" min="1" max="20" value="6" />
        <span id="unblurValue">6</span>
      </div>
    </div>

    <div class="blockers">
      <label class="blocker-item">
        <input type="checkbox" id="adsBlockedCheck" checked />
        <span data-i18n="blockAds">Block Ads</span>
      </label>
      <label class="blocker-item">
        <input type="checkbox" id="popupsBlockedCheck" checked />
        <span data-i18n="blockPopups">Block Pop-ups</span>
      </label>
    </div>

    <div class="list-controls">
      <button id="whitelist" data-i18n="whitelist">✓ Whitelist</button>
      <button id="blacklist" data-i18n="blacklist">✗ Blacklist</button>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div id="feedbackModal">
    <div class="modal-content">
      <h3 data-i18n="feedbackTitle">Send Feedback</h3>
      <p style="font-size: 12px; color: #666; margin-bottom: 12px;" data-i18n="feedbackDesc">
        Help improve the grading system. What's wrong with the current grade?
      </p>
      <textarea id="feedbackText" data-i18n-placeholder="feedbackPlaceholder" placeholder="This site is actually... "></textarea>
      <div class="modal-controls">
        <button id="submitFeedback" data-i18n="submit">Submit</button>
        <button id="cancelFeedback" data-i18n="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="analyzer.js"></script>
  <script src="popup.js"></script>
</body>
</html>

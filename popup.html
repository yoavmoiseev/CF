<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Content Filter</title>
  <style>
    body {
      font-family: sans-serif;
      width: 200px;
      padding: 16px;
      text-align: center;
    }
    #status {
      font-size: 16px;
      margin-bottom: 12px;
      font-weight: bold;
    }
    #toggle {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      width: 100%;
    }
    #toggle:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div id="status">Status: ...</div>
  <button id="toggle">Toggle Filter</button>
  <script src="popup.js"></script>
</body>
</html>
